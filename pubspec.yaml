name: doc_library
description: A privacy-first personal document library built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Vision & Camera
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_document_scanner: ^0.4.1
  camera: ^0.12.0+1

  # Utilities
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  path: ^1.8.3
  pdf: ^3.10.7
  image_picker: ^1.0.4
  share_plus: ^13.1.0
  local_auth: ^3.0.1
  opencv_dart: ^2.2.1+4
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/logo.png
